<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lingua — Learn Languages</title>
  <link
    href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400;1,700&family=DM+Sans:wght@300;400;500;600&display=swap"
    rel="stylesheet">
  <style>
    :root {
      --bg: #0e0e0f;
      --surface: #161618;
      --surface2: #1e1e21;
      --border: rgba(255, 255, 255, 0.07);
      --text: #f0ede8;
      --muted: #7a7875;
      --accent: #e8c97a;
      --accent2: #c4a44e;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
    }

    nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1.2rem 3rem;
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(14, 14, 15, 0.94);
      backdrop-filter: blur(16px);
      gap: 1rem;
    }

    .logo {
      font-family: 'Playfair Display', serif;
      font-size: 1.5rem;
      font-weight: 900;
      letter-spacing: -0.02em;
      color: var(--accent);
      flex-shrink: 0;
    }

    .logo span {
      color: var(--text);
    }

    .nav-langs {
      display: flex;
      gap: 0.4rem;
      flex-wrap: wrap;
    }

    .nav-lang-btn {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--muted);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.8rem;
      font-weight: 500;
      padding: 0.4rem 0.9rem;
      border-radius: 100px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .nav-lang-btn:hover,
    .nav-lang-btn.active {
      border-color: var(--accent);
      color: var(--accent);
      background: rgba(232, 201, 122, 0.08);
    }

    .hero {
      text-align: center;
      padding: 5rem 2rem 3rem;
      position: relative;
    }

    .hero::before {
      content: '';
      position: absolute;
      top: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 600px;
      height: 300px;
      background: radial-gradient(ellipse, rgba(232, 201, 122, 0.10) 0%, transparent 70%);
      pointer-events: none;
    }

    .hero-eyebrow {
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 1.2rem;
    }

    .hero h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(2.6rem, 6vw, 4.8rem);
      font-weight: 900;
      line-height: 1.07;
      letter-spacing: -0.03em;
      margin-bottom: 1.2rem;
    }

    .hero h1 em {
      font-style: italic;
      color: var(--accent);
    }

    .hero p {
      font-size: 1rem;
      color: var(--muted);
      max-width: 460px;
      margin: 0 auto 2.5rem;
      line-height: 1.7;
    }

    .lang-picker {
      display: flex;
      justify-content: center;
      gap: 1.1rem;
      flex-wrap: wrap;
      margin-bottom: 3.5rem;
    }

    .lang-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 1.6rem 2.2rem;
      cursor: pointer;
      transition: all 0.25s;
      text-align: center;
      min-width: 145px;
      position: relative;
      overflow: hidden;
    }

    .lang-card::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(232, 201, 122, 0.08), transparent);
      opacity: 0;
      transition: opacity 0.25s;
    }

    .lang-card:hover {
      border-color: rgba(232, 201, 122, 0.35);
      transform: translateY(-3px);
    }

    .lang-card:hover::before {
      opacity: 1;
    }

    .lang-card.selected {
      border-color: var(--accent);
      background: rgba(232, 201, 122, 0.05);
    }

    .lang-card.selected::before {
      opacity: 1;
    }

    .lang-flag {
      font-size: 2.6rem;
      margin-bottom: 0.5rem;
      display: block;
    }

    .lang-name {
      font-family: 'Playfair Display', serif;
      font-size: 1.05rem;
      font-weight: 700;
    }

    .lang-native {
      font-size: 0.75rem;
      color: var(--muted);
      margin-top: 0.2rem;
    }

    #lesson-area {
      max-width: 960px;
      margin: 0 auto;
      padding: 0 2rem 6rem;
      display: none;
    }

    #lesson-area.visible {
      display: block;
    }

    .section-title {
      font-family: 'Playfair Display', serif;
      font-size: 1.7rem;
      font-weight: 700;
      margin-bottom: 1.4rem;
    }

    .section-title span {
      color: var(--accent);
    }

    .tabs {
      display: flex;
      gap: 0.3rem;
      border-bottom: 1px solid var(--border);
      margin-bottom: 2.5rem;
      overflow-x: auto;
    }

    .tab {
      background: transparent;
      border: none;
      color: var(--muted);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.88rem;
      font-weight: 500;
      padding: 0.75rem 1.3rem;
      cursor: pointer;
      border-bottom: 2px solid transparent;
      margin-bottom: -1px;
      transition: all 0.2s;
      white-space: nowrap;
    }

    .tab:hover {
      color: var(--text);
    }

    .tab.active {
      color: var(--accent);
      border-bottom-color: var(--accent);
    }

    .cat-filter {
      display: flex;
      gap: 0.5rem;
      flex-wrap: wrap;
      margin-bottom: 1.8rem;
    }

    .cat-btn {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--muted);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.78rem;
      font-weight: 600;
      letter-spacing: 0.05em;
      padding: 0.38rem 0.9rem;
      border-radius: 100px;
      cursor: pointer;
      transition: all 0.18s;
    }

    .cat-btn:hover {
      color: var(--text);
      border-color: rgba(255, 255, 255, 0.18);
    }

    .cat-btn.active {
      border-color: var(--accent);
      color: var(--accent);
      background: rgba(232, 201, 122, 0.08);
    }

    .vocab-count {
      font-size: 0.8rem;
      color: var(--muted);
      margin-bottom: 1rem;
    }

    .vocab-count strong {
      color: var(--accent);
    }

    .vocab-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(185px, 1fr));
      gap: 0.85rem;
    }

    .vocab-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 1.2rem 1.3rem;
      cursor: pointer;
      transition: all 0.2s;
      position: relative;
    }

    .vocab-card:hover {
      border-color: rgba(232, 201, 122, 0.25);
      transform: translateY(-2px);
    }

    .vocab-card.revealed {
      border-color: rgba(232, 201, 122, 0.2);
      background: rgba(232, 201, 122, 0.03);
    }

    .vocab-card .foreign {
      font-family: 'Playfair Display', serif;
      font-size: 1.2rem;
      font-weight: 700;
      margin-bottom: 0.25rem;
    }

    .vocab-card .english {
      font-size: 0.82rem;
      color: var(--muted);
      display: none;
    }

    .vocab-card.revealed .english {
      display: block;
    }

    .vocab-card .category-tag {
      position: absolute;
      top: 0.7rem;
      right: 0.75rem;
      font-size: 0.62rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--accent2);
      opacity: 0.75;
    }

    .vocab-hint {
      font-size: 0.73rem;
      color: var(--muted);
      margin-top: 1.3rem;
      text-align: center;
    }

    .phrases-list {
      display: flex;
      flex-direction: column;
      gap: 0.85rem;
    }

    .phrase-item {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 13px;
      padding: 1.1rem 1.4rem;
      display: grid;
      grid-template-columns: 1fr 1fr auto;
      gap: 1rem;
      align-items: center;
    }

    .phrase-foreign {
      font-family: 'Playfair Display', serif;
      font-size: 1.05rem;
    }

    .phrase-english {
      font-size: 0.87rem;
      color: var(--muted);
    }

    .phrase-context {
      font-size: 0.7rem;
      color: var(--accent2);
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      text-align: right;
    }

    .grammar-section {
      display: flex;
      flex-direction: column;
      gap: 1.3rem;
    }

    .grammar-block {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 15px;
      padding: 1.6rem;
    }

    .grammar-block h3 {
      font-family: 'Playfair Display', serif;
      font-size: 1.15rem;
      margin-bottom: 0.7rem;
      color: var(--accent);
    }

    .grammar-block p {
      color: var(--muted);
      font-size: 0.92rem;
      line-height: 1.7;
      margin-bottom: 0.7rem;
    }

    .grammar-example {
      background: var(--surface2);
      border-radius: 9px;
      padding: 0.8rem 1.1rem;
      margin-top: 0.45rem;
      font-family: 'Playfair Display', serif;
      font-size: 0.97rem;
      border-left: 3px solid var(--accent);
    }

    .grammar-example span {
      color: var(--muted);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.82rem;
      font-style: normal;
      margin-left: 0.7rem;
    }

    /* QUIZ */
    .quiz-setup {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 2rem;
      margin-bottom: 1.8rem;
    }

    .quiz-setup-label {
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 0.9rem;
    }

    .quiz-cat-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      margin-bottom: 1.2rem;
    }

    .quiz-cat-btn {
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--muted);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.8rem;
      font-weight: 600;
      padding: 0.42rem 1rem;
      border-radius: 100px;
      cursor: pointer;
      transition: all 0.18s;
    }

    .quiz-cat-btn:hover {
      color: var(--text);
      border-color: rgba(255, 255, 255, 0.2);
    }

    .quiz-cat-btn.selected {
      border-color: var(--accent);
      color: var(--accent);
      background: rgba(232, 201, 122, 0.08);
    }

    .quiz-meta {
      font-size: 0.82rem;
      color: var(--muted);
      margin-bottom: 1.2rem;
    }

    .quiz-meta strong {
      color: var(--accent);
    }

    .btn-start-quiz {
      background: var(--accent);
      color: var(--bg);
      border: none;
      border-radius: 11px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.95rem;
      font-weight: 700;
      padding: 0.85rem 2rem;
      cursor: pointer;
      transition: background 0.2s;
    }

    .btn-start-quiz:hover:not(:disabled) {
      background: var(--accent2);
    }

    .btn-start-quiz:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    .quiz-active {
      display: none;
    }

    .quiz-active.running {
      display: block;
    }

    .quiz-wrap {
      max-width: 540px;
      margin: 0 auto;
    }

    .quiz-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1rem;
    }

    .quiz-progress-text {
      font-size: 0.82rem;
      color: var(--muted);
    }

    .quiz-progress-bar {
      height: 4px;
      background: var(--surface2);
      border-radius: 2px;
      margin-bottom: 1.5rem;
      overflow: hidden;
    }

    .quiz-progress-fill {
      height: 100%;
      background: var(--accent);
      border-radius: 2px;
      transition: width 0.3s ease;
    }

    .quiz-question {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 2.2rem;
      text-align: center;
      margin-bottom: 1.3rem;
    }

    .quiz-prompt {
      font-size: 0.75rem;
      color: var(--muted);
      margin-bottom: 0.7rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    .quiz-category-badge {
      display: inline-block;
      font-size: 0.68rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--accent2);
      background: rgba(232, 201, 122, 0.08);
      padding: 0.2rem 0.7rem;
      border-radius: 100px;
      margin-bottom: 0.9rem;
    }

    .quiz-word {
      font-family: 'Playfair Display', serif;
      font-size: 2.3rem;
      font-weight: 700;
    }

    .quiz-options {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.7rem;
    }

    .quiz-opt {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.9rem;
      font-weight: 500;
      padding: 0.9rem 1.2rem;
      border-radius: 11px;
      cursor: pointer;
      transition: all 0.18s;
      text-align: left;
    }

    .quiz-opt:hover:not(:disabled) {
      border-color: rgba(232, 201, 122, 0.35);
      background: var(--surface2);
    }

    .quiz-opt.correct {
      border-color: #6fcf97;
      background: rgba(111, 207, 151, 0.1);
      color: #6fcf97;
    }

    .quiz-opt.wrong {
      border-color: #eb5757;
      background: rgba(235, 87, 87, 0.1);
      color: #eb5757;
    }

    .quiz-opt:disabled {
      cursor: default;
    }

    .quiz-feedback {
      text-align: center;
      margin-top: 1rem;
      font-size: 0.88rem;
      min-height: 1.4rem;
      color: var(--muted);
    }

    .quiz-feedback.good {
      color: #6fcf97;
    }

    .quiz-feedback.bad {
      color: #eb5757;
    }

    .btn-next {
      display: none;
      width: 100%;
      margin-top: 0.9rem;
      background: var(--accent);
      color: var(--bg);
      border: none;
      border-radius: 11px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.95rem;
      font-weight: 700;
      padding: 0.9rem;
      cursor: pointer;
      transition: background 0.2s;
    }

    .btn-next:hover {
      background: var(--accent2);
    }

    .quiz-result {
      display: none;
      text-align: center;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 3rem 2rem;
    }

    .quiz-result.visible {
      display: block;
    }

    .result-emoji {
      font-size: 3rem;
      margin-bottom: 1rem;
    }

    .result-score {
      font-family: 'Playfair Display', serif;
      font-size: 2.5rem;
      font-weight: 900;
      color: var(--accent);
      margin-bottom: 0.4rem;
    }

    .result-label {
      color: var(--muted);
      font-size: 0.95rem;
      margin-bottom: 1.8rem;
    }

    .btn-retry {
      background: transparent;
      border: 1px solid var(--accent);
      color: var(--accent);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.9rem;
      font-weight: 600;
      padding: 0.75rem 2rem;
      border-radius: 11px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-retry:hover {
      background: rgba(232, 201, 122, 0.08);
    }

    .tab-panel {
      display: none;
    }

    .tab-panel.active {
      display: block;
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(16px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .animate-in {
      animation: fadeUp 0.38s ease both;
    }

    @media (max-width: 620px) {
      nav {
        padding: 1rem 1.2rem;
      }

      .hero {
        padding: 3.5rem 1.2rem 2rem;
      }

      .phrase-item {
        grid-template-columns: 1fr;
      }

      .quiz-options {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

<body>

  <nav>
    <div class="logo">Lin<span>gua</span></div>
    <div class="nav-langs" id="navLangs"></div>
  </nav>

  <main>
    <section class="hero">
      <p class="hero-eyebrow">Free Language Learning</p>
      <h1>Speak the<br><em>world's</em> languages</h1>
      <p>Choose a language to start learning vocabulary, phrases, grammar, and quiz yourself by category.</p>
    </section>

    <div class="lang-picker" id="langPicker"></div>

    <div id="lesson-area">
      <div class="tabs">
        <button class="tab active" data-tab="vocab">Vocabulary</button>
        <button class="tab" data-tab="phrases">Phrases</button>
        <button class="tab" data-tab="grammar">Grammar</button>
        <button class="tab" data-tab="quiz">Quiz</button>
      </div>

      <div class="tab-panel active" id="tab-vocab">
        <div class="section-title" id="vocabTitle"></div>
        <div class="cat-filter" id="vocabCatFilter"></div>
        <div class="vocab-count" id="vocabCount"></div>
        <div class="vocab-grid" id="vocabGrid"></div>
        <p class="vocab-hint">💡 Click any card to reveal the English translation</p>
      </div>

      <div class="tab-panel" id="tab-phrases">
        <div class="section-title" id="phrasesTitle"></div>
        <div class="cat-filter" id="phrasesCatFilter"></div>
        <div class="phrases-list" id="phrasesList"></div>
      </div>

      <div class="tab-panel" id="tab-grammar">
        <div class="section-title" id="grammarTitle"></div>
        <div class="grammar-section" id="grammarSection"></div>
      </div>

      <div class="tab-panel" id="tab-quiz">
        <div class="section-title" id="quizTitle"></div>
        <div class="quiz-setup" id="quizSetup">
          <div class="quiz-setup-label">Choose categories to quiz</div>
          <div class="quiz-cat-grid" id="quizCatGrid"></div>
          <div class="quiz-meta" id="quizMeta"></div>
          <button class="btn-start-quiz" id="btnStartQuiz" onclick="startQuiz()">Start Quiz →</button>
        </div>
        <div class="quiz-active" id="quizActive">
          <div class="quiz-wrap">
            <div class="quiz-header">
              <span class="quiz-progress-text" id="quizProgressText"></span>
              <span class="quiz-progress-text" id="quizScoreLive">Score: 0</span>
            </div>
            <div class="quiz-progress-bar">
              <div class="quiz-progress-fill" id="quizProgressFill" style="width:0%"></div>
            </div>
            <div class="quiz-question">
              <div class="quiz-prompt">Translate this word</div>
              <div class="quiz-category-badge" id="quizCatBadge"></div>
              <div class="quiz-word" id="quizWord"></div>
            </div>
            <div class="quiz-options" id="quizOptions"></div>
            <div class="quiz-feedback" id="quizFeedback"></div>
            <button class="btn-next" id="btnNext">Next →</button>
          </div>
        </div>
        <div class="quiz-result" id="quizResult">
          <div class="result-emoji" id="resultEmoji"></div>
          <div class="result-score" id="resultScore"></div>
          <div class="result-label" id="resultLabel"></div>
          <button class="btn-retry" onclick="backToSetup()">← Change Categories</button>
        </div>
      </div>
    </div>
  </main>

  <script>
    // ══════════════════════════════════════════════════════
    //  LANGUAGE DATA
    //  To add a language: copy a block, update id/name/flag,
    //  and fill in vocab (with consistent category names),
    //  phrases (with context), and grammar.
    // ══════════════════════════════════════════════════════

    const LANGUAGES = [

      // ─────────────────────── SPANISH ──────────────────────
      {
        id: "spanish",
        name: "Spanish",
        native: "Español",
        flag: "🇪🇸",

        vocab: [
          // Basics
          { foreign: "Hola", english: "Hello", category: "Basics" },
          { foreign: "Adiós", english: "Goodbye", category: "Basics" },
          { foreign: "Hasta luego", english: "See you later", category: "Basics" },
          { foreign: "Sí", english: "Yes", category: "Basics" },
          { foreign: "No", english: "No", category: "Basics" },
          { foreign: "Por favor", english: "Please", category: "Basics" },
          { foreign: "Gracias", english: "Thank you", category: "Basics" },
          { foreign: "De nada", english: "You're welcome", category: "Basics" },
          { foreign: "Perdón", english: "Excuse me / Sorry", category: "Basics" },
          { foreign: "Lo siento", english: "I'm sorry", category: "Basics" },
          // Pronouns & Core Verbs
          { foreign: "Yo", english: "I", category: "Pronouns" },
          { foreign: "Tú", english: "You (informal)", category: "Pronouns" },
          { foreign: "Él / Ella", english: "He / She", category: "Pronouns" },
          { foreign: "Nosotros", english: "We", category: "Pronouns" },
          { foreign: "Ellos", english: "They", category: "Pronouns" },

                { "foreign": "Я студент.", "english": "I am a student. (no verb needed in present)" }
              ]
            },
            {
              "title": "Noun Gender",
              "text": "Ukrainian nouns have three genders: masculine, feminine, and neuter. Masculine nouns typically end in a consonant, feminine in -а/-я, and neuter in -о/-е/-я. Gender affects adjective and verb agreement.",
              "examples": [
                { "foreign": "брат (m), сестра (f), місто (n)", "english": "brother (m), sister (f), city (n)" }
              ]
            },
            {
              "title": "Seven Cases",
              "text": "Ukrainian has seven grammatical cases: nominative, genitive, dative, accusative, instrumental, locative, and vocative. The vocative case — used when addressing someone directly — is especially well-preserved in Ukrainian.",
              "examples": [
                { "foreign": "Мамо! (vocative)", "english": "Mom! (directly addressing her — special vocative form)" },
                { "foreign": "Я бачу книгу. (accusative)", "english": "I see the book. (книга → книгу)" }
              ]
            },
            {
              "title": "Verb Aspect: Imperfective vs Perfective",
              "text": "Like Russian, Ukrainian verbs come in imperfective (ongoing/repeated) and perfective (completed) pairs. Choosing the right aspect is fundamental to sounding natural in Ukrainian.",
              "examples": [
                { "foreign": "читати (impf.) / прочитати (pf.)", "english": "to read (ongoing) / to finish reading (completed)" },
                { "foreign": "Я читав книгу. / Я прочитав книгу.", "english": "I was reading the book. / I read (finished) the book." }
              ]
            },
            {
              "title": "Adjective Agreement",
              "text": "Ukrainian adjectives agree with the noun in gender, number, and case. Masculine adjectives end in -ий/-ій, feminine in -а/-я, neuter in -е/-є, and plural in -і.",
              "examples": [
                { "foreign": "новий дім (m), нова книга (f), нове місто (n)", "english": "new house (m), new book (f), new city (n)" }
              ]
            }
          ]
        }
      ]

      // ═══════════════════════════════════════════════════════
      // ADD NEW LANGUAGES HERE — copy a language block above,
      // update id/name/native/flag, and fill in vocab, phrases,
      // grammar. Categories are auto-generated — be consistent.
      // ═══════════════════════════════════════════════════════
    ];

    // ══════════════════════════════════════════════════════
    //  STATE
    // ══════════════════════════════════════════════════════
    let currentLang = null;
    let vocabCatFilter = 'All';
    let phrasesCatFilter = 'All';
    let selectedQuizCats = new Set();
    let quizPool = [], quizIndex = 0, quizScore = 0, quizAnswered = false;

    // ── BOOT ──────────────────────────────────────────────
    function init() {
      renderLangPicker();
      renderNavLangs();
      document.querySelectorAll('.tab').forEach(t =>
        t.addEventListener('click', () => activateTab(t.dataset.tab))
      );
    }

    function renderLangPicker() {
      const el = document.getElementById('langPicker');
      el.innerHTML = '';
      LANGUAGES.forEach(lang => {
        const card = document.createElement('div');
        card.className = 'lang-card';
        card.id = `langCard-${lang.id}`;
        card.innerHTML = `<span class="lang-flag">${lang.flag}</span>
      <div class="lang-name">${lang.name}</div>
      <div class="lang-native">${lang.native}</div>`;
        card.addEventListener('click', () => selectLang(lang.id));
        el.appendChild(card);
      });
    }

    function renderNavLangs() {
      const el = document.getElementById('navLangs');
      el.innerHTML = '';
      LANGUAGES.forEach(lang => {
        const btn = document.createElement('button');
        btn.className = 'nav-lang-btn';
        btn.id = `navBtn-${lang.id}`;
        btn.textContent = `${lang.flag} ${lang.name}`;
        btn.addEventListener('click', () => selectLang(lang.id));
        el.appendChild(btn);
      });
    }

    function selectLang(id) {
      currentLang = LANGUAGES.find(l => l.id === id);
      if (!currentLang) return;
      vocabCatFilter = phrasesCatFilter = 'All';

      document.querySelectorAll('.lang-card').forEach(c => c.classList.remove('selected'));
      document.querySelectorAll('.nav-lang-btn').forEach(b => b.classList.remove('active'));
      document.getElementById(`langCard-${id}`)?.classList.add('selected');
      document.getElementById(`navBtn-${id}`)?.classList.add('active');

      const area = document.getElementById('lesson-area');
      area.classList.add('visible', 'animate-in');
      setTimeout(() => area.classList.remove('animate-in'), 500);

      activateTab('vocab');
      renderVocab(); renderPhrases(); renderGrammar();
    }

    // ── TABS ───────────────────────────────────────────────
    function activateTab(id) {
      document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.tab === id));
      document.querySelectorAll('.tab-panel').forEach(p => p.classList.toggle('active', p.id === `tab-${id}`));
      if (id === 'quiz') renderQuizSetup();
    }

    // ── VOCAB ──────────────────────────────────────────────
    function renderVocab() {
      const lang = currentLang;
      document.getElementById('vocabTitle').innerHTML = `<span>${lang.flag}</span> ${lang.name} — Vocabulary`;
      renderVocabGrid();
    }

    function renderVocabGrid() {
      const lang = currentLang;
      const cats = ['All', ...new Set(lang.vocab.map(w => w.category))];
      const filtered = vocabCatFilter === 'All' ? lang.vocab : lang.vocab.filter(w => w.category === vocabCatFilter);

      // Filter bar
      const bar = document.getElementById('vocabCatFilter');
      bar.innerHTML = '';
      cats.forEach(cat => {
        const btn = document.createElement('button');
        btn.className = 'cat-btn' + (cat === vocabCatFilter ? ' active' : '');
        btn.textContent = cat;
        btn.addEventListener('click', () => { vocabCatFilter = cat; renderVocabGrid(); });
        bar.appendChild(btn);
      });

      document.getElementById('vocabCount').innerHTML =
        `Showing <strong>${filtered.length}</strong> of ${lang.vocab.length} words`;

      const grid = document.getElementById('vocabGrid');
      grid.innerHTML = '';
      filtered.forEach(item => {
        const card = document.createElement('div');
        card.className = 'vocab-card animate-in';
        card.innerHTML = `<div class="foreign">${item.foreign}</div>
      <div class="english">${item.english}</div>
      <div class="category-tag">${item.category}</div>`;
        card.addEventListener('click', () => card.classList.toggle('revealed'));
        grid.appendChild(card);
      });
    }

    // ── PHRASES ────────────────────────────────────────────
    function renderPhrases() {
      const lang = currentLang;
      document.getElementById('phrasesTitle').innerHTML = `<span>${lang.flag}</span> ${lang.name} — Phrases`;
      renderPhrasesList();
    }

    function renderPhrasesList() {
      const lang = currentLang;
      const ctxs = ['All', ...new Set(lang.phrases.map(p => p.context))];
      const filtered = phrasesCatFilter === 'All' ? lang.phrases : lang.phrases.filter(p => p.context === phrasesCatFilter);

      const bar = document.getElementById('phrasesCatFilter');
      bar.innerHTML = '';
      ctxs.forEach(ctx => {
        const btn = document.createElement('button');
        btn.className = 'cat-btn' + (ctx === phrasesCatFilter ? ' active' : '');
        btn.textContent = ctx;
        btn.addEventListener('click', () => { phrasesCatFilter = ctx; renderPhrasesList(); });
        bar.appendChild(btn);
      });

      const list = document.getElementById('phrasesList');
      list.innerHTML = '';
      filtered.forEach(p => {
        const item = document.createElement('div');
        item.className = 'phrase-item animate-in';
        item.innerHTML = `<div class="phrase-foreign">${p.foreign}</div>
      <div class="phrase-english">${p.english}</div>
      <div class="phrase-context">${p.context}</div>`;
        list.appendChild(item);
      });
    }

    // ── GRAMMAR ────────────────────────────────────────────
    function renderGrammar() {
      const lang = currentLang;
      document.getElementById('grammarTitle').innerHTML = `<span>${lang.flag}</span> ${lang.name} — Grammar`;
      const section = document.getElementById('grammarSection');
      section.innerHTML = '';
      lang.grammar.forEach(g => {
        const block = document.createElement('div');
        block.className = 'grammar-block animate-in';
        const examples = g.examples.map(e =>
          `<div class="grammar-example">${e.foreign}<span>→ ${e.english}</span></div>`
        ).join('');
        block.innerHTML = `<h3>${g.title}</h3><p>${g.text}</p>${examples}`;
        section.appendChild(block);
      });
    }

    // ── QUIZ SETUP ─────────────────────────────────────────
    function renderQuizSetup() {
      const lang = currentLang;
      if (!lang) return;

      document.getElementById('quizTitle').innerHTML = `<span>${lang.flag}</span> ${lang.name} — Quiz`;
      document.getElementById('quizSetup').style.display = 'block';
      document.getElementById('quizActive').classList.remove('running');
      document.getElementById('quizResult').classList.remove('visible');

      const cats = [...new Set(lang.vocab.map(w => w.category))];
      selectedQuizCats = new Set(cats);

      const grid = document.getElementById('quizCatGrid');
      grid.innerHTML = '';

      // "All" toggle button
      const allBtn = document.createElement('button');
      allBtn.className = 'quiz-cat-btn selected';
      allBtn.id = 'quizBtnAll';
      allBtn.textContent = '★ All Categories';
      allBtn.addEventListener('click', () => {
        if (selectedQuizCats.size === cats.length) selectedQuizCats.clear();
        else cats.forEach(c => selectedQuizCats.add(c));
        syncQuizButtons(cats);
      });
      grid.appendChild(allBtn);

      cats.forEach(cat => {
        const btn = document.createElement('button');
        btn.className = 'quiz-cat-btn selected';
        btn.dataset.cat = cat;
        btn.textContent = cat;
        btn.addEventListener('click', () => {
          selectedQuizCats.has(cat) ? selectedQuizCats.delete(cat) : selectedQuizCats.add(cat);
          syncQuizButtons(cats);
        });
        grid.appendChild(btn);
      });

      syncQuizButtons(cats);
    }

    function syncQuizButtons(cats) {
      cats.forEach(cat => {
        const btn = document.querySelector(`.quiz-cat-btn[data-cat="${cat}"]`);
        if (btn) btn.classList.toggle('selected', selectedQuizCats.has(cat));
      });
      const allBtn = document.getElementById('quizBtnAll');
      if (allBtn) allBtn.classList.toggle('selected', selectedQuizCats.size === cats.length);
      updateQuizMeta();
    }

    function updateQuizMeta() {
      const lang = currentLang;
      const count = lang.vocab.filter(w => selectedQuizCats.has(w.category)).length;
      document.getElementById('quizMeta').innerHTML =
        `<strong>${count}</strong> word${count !== 1 ? 's' : ''} selected across <strong>${selectedQuizCats.size}</strong> categor${selectedQuizCats.size !== 1 ? 'ies' : 'y'}`;
      const btn = document.getElementById('btnStartQuiz');
      btn.disabled = count < 4;
      btn.textContent = count < 4 ? 'Select at least 4 words to start' : `Start Quiz (${count} words) →`;
    }

    // ── QUIZ ACTIVE ────────────────────────────────────────
    function startQuiz() {
      quizPool = currentLang.vocab
        .filter(w => selectedQuizCats.has(w.category))
        .sort(() => Math.random() - 0.5);
      quizIndex = quizScore = 0;
      quizAnswered = false;

      document.getElementById('quizSetup').style.display = 'none';
      document.getElementById('quizResult').classList.remove('visible');
      document.getElementById('quizActive').classList.add('running');
      showQuestion();
    }

    function showQuestion() {
      if (quizIndex >= quizPool.length) { showResult(); return; }

      const current = quizPool[quizIndex];
      quizAnswered = false;

      const pct = Math.round((quizIndex / quizPool.length) * 100);
      document.getElementById('quizProgressText').textContent = `Question ${quizIndex + 1} of ${quizPool.length}`;
      document.getElementById('quizProgressFill').style.width = pct + '%';
      document.getElementById('quizScoreLive').textContent = `Score: ${quizScore}`;
      document.getElementById('quizWord').textContent = current.foreign;
      document.getElementById('quizCatBadge').textContent = current.category;
      document.getElementById('quizFeedback').textContent = '';
      document.getElementById('quizFeedback').className = 'quiz-feedback';
      document.getElementById('btnNext').style.display = 'none';

      // Distractors — prefer same category for harder quiz
      const rest = quizPool.filter((_, i) => i !== quizIndex);
      const sameCat = rest.filter(w => w.category === current.category).sort(() => Math.random() - 0.5);
      const diffCat = rest.filter(w => w.category !== current.category).sort(() => Math.random() - 0.5);
      const distractors = [...sameCat, ...diffCat].slice(0, 3);
      const answers = [...distractors, current].sort(() => Math.random() - 0.5);

      const opts = document.getElementById('quizOptions');
      opts.innerHTML = '';
      answers.forEach(ans => {
        const btn = document.createElement('button');
        btn.className = 'quiz-opt';
        btn.textContent = ans.english;
        btn.addEventListener('click', () => handleAnswer(btn, ans, current));
        opts.appendChild(btn);
      });
    }

    function handleAnswer(btn, chosen, correct) {
      if (quizAnswered) return;
      quizAnswered = true;

      const ok = chosen.english === correct.english;
      if (ok) { btn.classList.add('correct'); quizScore++; }
      else {
        btn.classList.add('wrong');
        document.querySelectorAll('.quiz-opt').forEach(b => {
          if (b.textContent === correct.english) b.classList.add('correct');
        });
      }
      document.querySelectorAll('.quiz-opt').forEach(b => b.disabled = true);
      document.getElementById('quizFeedback').textContent = ok ? '✓ Correct!' : `✗ The answer was: ${correct.english}`;
      document.getElementById('quizFeedback').className = 'quiz-feedback ' + (ok ? 'good' : 'bad');
      document.getElementById('quizScoreLive').textContent = `Score: ${quizScore}`;

      const nb = document.getElementById('btnNext');
      nb.style.display = 'block';
      nb.textContent = quizIndex + 1 >= quizPool.length ? 'See Results →' : 'Next →';
      nb.onclick = () => { quizIndex++; showQuestion(); };
    }

    function showResult() {
      document.getElementById('quizActive').classList.remove('running');
      const result = document.getElementById('quizResult');
      result.classList.add('visible');

      const total = quizPool.length;
      const pct = Math.round((quizScore / total) * 100);
      let emoji = '🌱', label = "Keep practising — you'll get there!";
      if (pct == 100) { emoji = '🎉🏆🎉'; label = 'Outstanding! A perfect score!'; }
      else if (pct >= 90) { emoji = '🏆'; label = 'Outstanding! Near-perfect score!'; }
      else if (pct >= 75) { emoji = '🎉'; label = "Great work! You're making real progress."; }
      else if (pct >= 50) { emoji = '👍'; label = 'Good effort — review the ones you missed.'; }

      document.getElementById('resultEmoji').textContent = emoji;
      document.getElementById('resultScore').textContent = `${quizScore} / ${total}`;
      document.getElementById('resultLabel').textContent = label;
    }

    function backToSetup() {
      document.getElementById('quizResult').classList.remove('visible');
      document.getElementById('quizActive').classList.remove('running');
      renderQuizSetup();
    }

    init();
  </script>
</body>
